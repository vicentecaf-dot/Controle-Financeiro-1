{% extends "base.html" %}
{% block content %}

<div class="card">
<h3>Fatura {{ ym }}</h3>
<p>Período: {{start}} até {{end}}</p>
<p>Total: {{ brl(total) }}</p>

<table>
<tr><th>Data</th><th>Categoria</th><th>Desc</th><th class="right">Valor</th></tr>
{% for r in rows %}
<tr>
<td>{{r["competence_date"]}}</td>
<td>{{r["category"]}}</td>
<td>{{r["description"]}}</td>
<td class="right">{{ brl(r["amount_cents"]) }}</td>
</tr>
{% endfor %}
</table>
</div>

{% endblock %}
